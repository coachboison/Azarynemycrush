<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Final Birthday Experience 🎬</title>  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('duodua.jpg');
      background-size: cover;
      background-position: center;
      color: white;
      text-align: center;
      overflow-x: hidden;
    }

    .card {
      width: 92%;
      max-width: 500px;
      margin: 20px auto;
      padding: 20px;
      border-radius: 20px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 10px 40px rgba(0,0,0,0.7);
      animation: zoomIn 0.8s ease;
    }

    @keyframes zoomIn {
      from { transform: scale(0.85); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    h1 { font-size: 28px; }
    h2 { font-size: 26px; }

    p {
      font-size: 19px;
      line-height: 1.8;
    }

    #typedText {
      font-size: 21px;
    }

    button {
      width: 100%;
      font-size: 18px;
      padding: 15px;
      margin-top: 10px;
      border: none;
      border-radius: 12px;
      background: white;
      color: #ff4e78;
      font-weight: bold;
    }

    .hidden { display: none; }

    .heart {
      position: absolute;
      animation: float 6s linear infinite;
    }

    @keyframes float {
      from { transform: translateY(100vh); }
      to { transform: translateY(-10vh); }
    }

    .final-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: white;
      font-size: 24px;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: 1s;
    }

    .final-screen.show {
      opacity: 1;
      pointer-events: all;
    }
  </style></head>
<body><div class="card">
  <h1>🎂 Azaryne Duodua Apeakoron</h1>
  <p>Only you can unlock this 😌</p><button onclick="reveal()">Tap to Begin 🎁</button>

  <div id="message" class="hidden">
    <h2>Azaryne 💖</h2>
    <p id="typedText"></p><button onclick="loveExplosion()">💥 Feel the Love</button>
<button onclick="finalScene()">🎬 Final Surprise</button>

  </div>
</div><div class="final-screen" id="finalScreen">
  <div>
    💖
    <br><br>
    You’re truly special, Azaryne 😌✨
    <br><br>
    And today… the world celebrates YOU 🎉
    <br><br>
    Boison 💫
  </div>
</div><audio id="music" autoplay loop>
  <source src="song1.mp3.mp3" type="audio/mpeg">
</audio><audio id="clickSound">
  <source src="song1.mp3.mp3" type="audio/mpeg">
</audio><script>
const text = "Hey Duodua 🎉💖\n\nToday is all about YOU 😌✨\n\nYou bring a kind of energy that makes everything better 🌟\n\nI hope today gives you moments you’ll never forget 🥳\n\nKeep shining, keep smiling… and keep being YOU 💖\n\nEnjoy your day to the fullest 🔥";

let i = 0;

function typeEffect() {
  if (i < text.length) {
    document.getElementById("typedText").innerHTML += text.charAt(i) === "\n" ? "<br>" : text.charAt(i);
    i++;
    setTimeout(typeEffect, 25);
  }
}

function reveal() {
  document.getElementById("message").style.display = "block";
  document.getElementById("music").play().catch(()=>{});
  typeEffect();
}

function loveExplosion() {
  playSound();
  for (let i = 0; i < 120; i++) {
    const heart = document.createElement('div');
    heart.classList.add('heart');
    heart.innerHTML = '💖';
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.fontSize = (Math.random() * 30 + 15) + 'px';
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
  }
}

function finalScene() {
  playSound();
  document.getElementById("finalScreen").classList.add("show");
}

  function playSound() {
  const sound = document.getElementById("clickSound");
  sound.currentTime = 0;
  sound.play();
}

window.addEventListener('click', () => {
  for (let i = 0; i < 8; i++) {
    const heart = document.createElement('div');
    heart.classList.add('heart');
    heart.innerHTML = '💖';
    heart.style.left = Math.random() * 100 + 'vw';
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 4000);
  }
});
</script></body>

</html>
